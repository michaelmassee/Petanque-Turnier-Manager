# Konfiguration für ThreadingCallGraphArchTest (FreezingArchRule).
# Store mit dem heute bekannten, reviewten Off-Thread->VCL-Bestand. Der Build bricht nur bei
# NEU hinzukommenden Pfaden. Re-Freeze nach bewusster Änderung: freeze.refreeze=true setzen,
# einmal laufen lassen, aktualisierten Store committen, Flag zurücknehmen.
freeze.store.default.path=config/archunit/frozen-threading-violations
freeze.store.default.allowStoreCreation=true
freeze.store.default.allowStoreUpdate=true
freeze.refreeze=false
