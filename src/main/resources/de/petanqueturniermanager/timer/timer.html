<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pétanque Timer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root { --bg-custom: #000000; }

    body {
      background: var(--bg-custom);
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      transition: background 0.5s ease;
      user-select: none;
    }

    @keyframes blinken {
      0%, 100% { color: #ff2222; }
      50%       { color: #ff8888; }
    }

    #bezeichnung {
      font-size: clamp(1.4rem, 4vw, 4rem);
      color: #fff;
      font-weight: bold;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.55em;
      min-height: 1.2em;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.85);
    }

    #timer {
      font-size: clamp(4rem, 20vw, 20rem);
      font-weight: bold;
      letter-spacing: 0.05em;
      line-height: 1;
      transition: color 0.3s ease;
    }

    body.zustand-laeuft   #timer { color: #00ff44; }
    body.zustand-pausiert #timer { color: #ffee00; }
    body.zustand-beendet  #timer { color: #ff2222; animation: blinken 1s infinite; }
    body.zustand-inaktiv  #timer { color: #555; }

    #status {
      font-size: clamp(0.8rem, 2.5vw, 2rem);
      color: #888;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 0.5em;
      min-height: 1.5em;
    }

    body.zustand-beendet #status { color: #ff4444; font-size: clamp(1rem, 3vw, 2.5rem); }

    #tonstatus {
      margin-top: 1.2rem;
      padding: 0.75rem 1.3rem;
      border: 3px solid #ffcc00;
      background: #201600;
      color: #ffdd44;
      text-align: center;
      cursor: pointer;
      outline: none;
      box-shadow: 0 0 22px rgba(255, 204, 0, 0.35);
    }

    #tonstatus:focus {
      box-shadow: 0 0 0 4px #fff, 0 0 28px rgba(255, 204, 0, 0.6);
    }

    #tonstatus.fehler {
      border-color: #ff4444;
      background: #260000;
      color: #ff7777;
    }

    #tonstatus .titel {
      font-size: clamp(1.2rem, 3.5vw, 3rem);
      font-weight: bold;
      line-height: 1.1;
      text-transform: uppercase;
    }

    #tonstatus .hinweis {
      margin-top: 0.35rem;
      font-size: clamp(0.85rem, 2vw, 1.6rem);
      line-height: 1.2;
      color: #fff4b8;
    }

    body.ton-aktiv #tonstatus { display: none; }

    #verbindung {
      position: fixed;
      bottom: 0.5em;
      right: 0.8em;
      font-size: 0.7rem;
      color: #333;
    }

    #snooze {
      display: none;
      margin-top: 1.5em;
      padding: 0.6em 1.6em;
      font-size: clamp(1rem, 2.5vw, 1.6rem);
      font-family: inherit;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      background: #883300;
      border: 2px solid #ff6622;
      border-radius: 0.4em;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    #snooze:hover  { background: #aa4400; }
    #snooze:active { background: #662200; }
    body.zustand-beendet #snooze { display: inline-block; }
    body.snoozed #snooze         { display: none; }
  </style>
</head>
<body class="zustand-inaktiv">
  <div id="bezeichnung"></div>
  <div id="timer">--:--</div>
  <div id="status">Bereit</div>
  <div id="tonstatus" role="button" tabindex="0">
    <div class="titel">Kein Ton aktiv</div>
    <div class="hinweis">OK drücken / antippen für Ton</div>
  </div>
  <button id="snooze" type="button">Snooze</button>
  <div id="verbindung">⬤</div>

  <script>
    const timerEl       = document.getElementById('timer');
    const statusEl      = document.getElementById('status');
    const bezeichnungEl = document.getElementById('bezeichnung');
    const verbindungEl  = document.getElementById('verbindung');
    const snoozeEl      = document.getElementById('snooze');
    const tonstatusEl   = document.getElementById('tonstatus');

    const GONG_INTERVAL_MS = 5000;
    let gongTimer = null;
    let esQuelle = null;
    let audioAktiv = false;
    let aktuellerZustand = 'inaktiv';
    let aktuellSnoozed = false;
    let letzterGongStart = 0;

    function verbinde() {
      if (esQuelle) {
        esQuelle.close();
      }
      esQuelle = new EventSource('/events');

      esQuelle.onopen = () => {
        verbindungEl.style.color = '#006600';
        verbindungEl.title = 'Verbunden';
      };

      esQuelle.onmessage = (event) => {
        try {
          const d = JSON.parse(event.data);
          aktualisiereAnzeige(d);
        } catch (e) {
          console.error('JSON-Fehler:', e);
        }
      };

      esQuelle.onerror = () => {
        verbindungEl.style.color = '#660000';
        verbindungEl.title = 'Verbindung unterbrochen – reconnecting...';
      };
    }

    function aktualisiereAnzeige(d) {
      timerEl.textContent = d.anzeige || '--:--';
      statusEl.textContent = d.statusText || '';
      bezeichnungEl.textContent = d.bezeichnung || '';

      if (d.hintergrundFarbe) {
        document.documentElement.style.setProperty('--bg-custom', d.hintergrundFarbe);
      }

      const zustand = (d.zustand || 'INAKTIV').toLowerCase();
      aktuellerZustand = zustand;
      aktuellSnoozed = !!d.snoozed;
      const klassen = ['zustand-' + zustand];
      if (d.snoozed) klassen.push('snoozed');
      if (audioAktiv) klassen.push('ton-aktiv');
      document.body.className = klassen.join(' ');

      if (zustand === 'beendet' && !d.snoozed && audioAktiv) {
        startGongLoop();
      } else {
        stopGongLoop();
      }
    }

    const gong = new Audio('gong.wav');
    gong.preload = 'auto';

    async function spieleBeep() {
      gong.currentTime = 0;
      await gong.play();
      letzterGongStart = Date.now();
    }

    async function aktiviereTon() {
      try {
        await spieleBeep();
        audioAktiv = true;
        tonstatusEl.classList.remove('fehler');
        document.body.classList.add('ton-aktiv');
        if (aktuellerZustand === 'beendet' && !aktuellSnoozed) {
          startGongLoop();
        }
      } catch (e) {
        audioAktiv = false;
        tonstatusEl.classList.add('fehler');
        console.log('Audio nicht verfügbar:', e);
      }
    }

    function startGongLoop() {
      if (gongTimer !== null) return;
      if (Date.now() - letzterGongStart > 1000) {
        spieleBeep().catch(e => console.log('Audio nicht verfügbar:', e));
      }
      gongTimer = setInterval(() => {
        spieleBeep().catch(e => console.log('Audio nicht verfügbar:', e));
      }, GONG_INTERVAL_MS);
    }

    function stopGongLoop() {
      if (gongTimer !== null) {
        clearInterval(gongTimer);
        gongTimer = null;
      }
    }

    snoozeEl.addEventListener('click', () => {
      stopGongLoop();
      fetch('/snooze', { method: 'POST' }).catch(e => console.log('Snooze-Request fehlgeschlagen:', e));
    });

    tonstatusEl.addEventListener('click', aktiviereTon);
    tonstatusEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        aktiviereTon();
      }
    });

    verbinde();
  </script>
</body>
</html>
