startseite.tagline=Built with the precision of a software engineer and the passion of a p\u00e9tanque player.
startseite.spruch.1=Good luck and fair play!
startseite.spruch.2=A good throw starts with a steady hand.
startseite.spruch.3=P\u00e9tanque is precision in motion.
startseite.spruch.4=A carreau is the bonus \u2013 a point is the duty.
startseite.spruch.5=Calm in the hand, clarity in the mind.
startseite.spruch.6=Boule is head, hand and heart.
startseite.spruch.7=Tireur or pointeur \u2013 both take practice.
startseite.spruch.8=A graceful loser has already won.
startseite.spruch.9=Move the jack and you move the game.
startseite.spruch.10=Some measure with a ruler – others with feeling.
startseite.spruch.11=Between genius and gutter-ball there is often just one pebble.
startseite.spruch.12=The best tactic is useless without the right boule.
startseite.spruch.13=A good pointer knows the ground better than his living room.
startseite.spruch.14=You never forget a carreau – nor a fanny.
startseite.spruch.15=Better just barely off than not played at all.
startseite.spruch.16=The boule rarely rolls where the player expects.
startseite.spruch.17=Who throws, hopes. Who hits, grins.
startseite.spruch.18=Holding the last boule does not mean having won.
startseite.spruch.19=A good game is recognised by the laughter after the end.
startseite.spruch.20=Pétanque: the only sport where millimetres write stories.
