startseite.tagline=Gebaut mit der Pr\u00e4zision eines Informatikers und der Leidenschaft eines Boulers.
startseite.spruch.1=Viel Erfolg und faire Spiele!
startseite.spruch.2=Ein guter Wurf beginnt mit ruhiger Hand.
startseite.spruch.3=P\u00e9tanque ist Pr\u00e4zision in Bewegung.
startseite.spruch.4=Ein Carreau ist die K\u00fcr \u2013 ein Punkt ist die Pflicht.
startseite.spruch.5=Ruhe in der Hand, Klarheit im Kopf.
startseite.spruch.6=Boule ist Kopf, Hand und Herz.
startseite.spruch.7=Tireur oder Pointeur \u2013 beides will ge\u00fcbt sein.
startseite.spruch.8=Ein guter Verlierer hat schon gewonnen.
startseite.spruch.9=Wer die Sau bewegt, bewegt das Spiel.
startseite.spruch.10=Manche messen mit dem Zollstock, andere mit Gefühl.
startseite.spruch.11=Zwischen Genie und Lochkugel liegt oft nur ein Kieselstein.
startseite.spruch.12=Die beste Taktik hilft nichts ohne die richtige Kugel.
startseite.spruch.13=Ein guter Leger kennt den Boden besser als sein Wohnzimmer.
startseite.spruch.14=Ein Carreau vergisst man nie – eine Fanny auch nicht.
startseite.spruch.15=Lieber knapp daneben als gar nicht gespielt.
startseite.spruch.16=Die Kugel rollt selten dahin, wo der Spieler es erwartet.
startseite.spruch.17=Wer wirft, hofft. Wer trifft, grinst.
startseite.spruch.18=Wer die letzte Kugel hat, hat noch lange nicht gewonnen.
startseite.spruch.19=Ein gutes Spiel erkennt man am Lachen nach der Aufnahme.
startseite.spruch.20=Pétanque: Der einzige Sport, bei dem Millimeter Geschichten schreiben.
