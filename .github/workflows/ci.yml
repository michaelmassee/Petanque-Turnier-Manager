name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  test:
    name: Build & Unit-Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install LibreOffice UNO-SDK-JARs für compileOnly/test
        # Wir brauchen nur /usr/lib/libreoffice/program/classes/{ridl,unoil,juh,jurt}.jar.
        # libreoffice-java-common (~25 MB) liefert die zusammen mit libreoffice-core
        # — kein volles libreoffice-Meta-Paket (~500 MB) nötig. Reduziert Install-Zeit
        # und Mirror-Last drastisch. Pro Versuch ein eigenes 4-min-Timeout via `timeout`,
        # kein Step-Timeout (sonst killt es den Retry vorzeitig).
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "::group::apt update + install (Versuch $attempt)"
            if timeout 240 sudo apt-get update && \
               timeout 240 sudo apt-get install -y --no-install-recommends \
                 libreoffice-core \
                 libreoffice-java-common; then
              echo "::endgroup::"
              ls /usr/lib/libreoffice/program/classes/ | head
              exit 0
            fi
            echo "::endgroup::"
            echo "Versuch $attempt fehlgeschlagen, neuer Versuch in 15 s …"
            sleep 15
          done
          echo "Alle 3 apt-Versuche fehlgeschlagen."
          exit 1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        # gradle.properties enthält einen lokalen org.gradle.java.home (SDKMAN-Pfad),
        # den wir per -D auf den vom setup-java bereitgestellten JAVA_HOME überschreiben.
        run: ./gradlew test -Dorg.gradle.java.home="$JAVA_HOME" --no-daemon --stacktrace

      - name: SpotBugs (Bestandsaufnahme, ignoreFailures=true)
        run: ./gradlew spotbugsMain -Dorg.gradle.java.home="$JAVA_HOME" --no-daemon

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: build/reports/spotbugs/
          if-no-files-found: ignore
          retention-days: 14
