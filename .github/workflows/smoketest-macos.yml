name: Smoketest macOS

# Smoketest: baut die OXT auf Linux (macOS-Bundle hat kein SDK/unoidl-write),
# installiert LibreOffice auf einem macOS-Runner und führt den MeldeListeSheetUITest
# headless aus (erstellt eine Supermelee-Meldeliste und validiert sie).
# Läuft nightly, aber nur wenn es seit dem letzten Lauf neue Commits gibt;
# manueller Start (workflow_dispatch) läuft immer.
on:
  workflow_dispatch:
  schedule:
    # 03:30 UTC = 04:30/05:30 deutscher Zeit
    - cron: '30 3 * * *'

permissions:
  contents: read
  actions: read

jobs:
  pruefe-aenderungen:
    name: Neue Commits seit letztem Lauf?
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      laufen: ${{ steps.check.outputs.laufen }}
    steps:
      - name: HEAD mit letztem Smoketest-Lauf vergleichen
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manueller Start – Smoketest läuft immer."
            echo "laufen=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LETZTER_SHA=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/smoketest-macos.yml/runs?status=completed&branch=master&per_page=1" \
            -q '.workflow_runs[0].head_sha // empty')
          echo "Letzter Lauf: ${LETZTER_SHA:-keiner} – aktueller HEAD: ${{ github.sha }}"
          if [ "$LETZTER_SHA" = "${{ github.sha }}" ]; then
            echo "Keine neuen Commits seit dem letzten Lauf – Smoketest wird übersprungen."
            echo "laufen=false" >> "$GITHUB_OUTPUT"
          else
            echo "laufen=true" >> "$GITHUB_OUTPUT"
          fi

  build-oxt:
    name: Build OXT (Linux, mit SDK)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: pruefe-aenderungen
    if: needs.pruefe-aenderungen.outputs.laufen == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            frontend-spielerdb/package-lock.json

      - name: Install LibreOffice inkl. SDK (unoidl-write für compileIdl)
        # Wie ci.yml, zusätzlich libreoffice-dev für /usr/lib/libreoffice/sdk/bin/unoidl-write.
        # 5 Versuche mit exponentiellem Backoff (15/30/60/120 s) gegen Mirror-Flakyness.
        run: |
          set -e
          backoffs=(15 30 60 120)
          for attempt in 1 2 3 4 5; do
            echo "::group::apt update + install (Versuch $attempt)"
            if timeout 240 sudo apt-get update && \
               timeout 240 sudo apt-get install -y --no-install-recommends \
                 libreoffice-core \
                 libreoffice-java-common \
                 libreoffice-dev; then
              echo "::endgroup::"
              ls /usr/lib/libreoffice/sdk/bin/unoidl-write
              exit 0
            fi
            echo "::endgroup::"
            if [ "$attempt" -lt 5 ]; then
              wait="${backoffs[$((attempt-1))]}"
              echo "Versuch $attempt fehlgeschlagen, neuer Versuch in ${wait} s …"
              sleep "$wait"
            fi
          done
          echo "Alle 5 apt-Versuche fehlgeschlagen."
          exit 1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install frontend-spielerdb dependencies
        working-directory: frontend-spielerdb
        run: npm ci

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build OXT
        # gradle.properties enthält einen lokalen org.gradle.java.home (SDKMAN-Pfad),
        # den wir per -D auf den vom setup-java bereitgestellten JAVA_HOME überschreiben.
        run: ./gradlew buildOXT -Dorg.gradle.java.home="$JAVA_HOME" --no-daemon --stacktrace

      - name: Upload OXT artifact
        uses: actions/upload-artifact@v4
        with:
          name: oxt
          path: build/distributions/*.oxt
          if-no-files-found: error
          retention-days: 1

  smoketest-macos:
    name: Smoketest (macOS)
    runs-on: macos-latest
    timeout-minutes: 30
    needs: build-oxt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Temurin JDK 25 (Cask)
        # Cask landet in /Library/Java/JavaVirtualMachines — nur dort findet LOs jvmfwk
        # die JVM für die Java-Extension (setup-java/hostedtoolcache wird NICHT gefunden).
        # Dieselbe JVM wird auch für Gradle verwendet.
        run: |
          brew install --cask temurin@25
          echo "JAVA_HOME=$(/usr/libexec/java_home -v 25)" >> "$GITHUB_ENV"

      - name: Install LibreOffice (Cask)
        # Homebrew hat den --no-quarantine-Switch entfernt; stattdessen das
        # Gatekeeper-Quarantäne-Attribut nach der Installation löschen, sonst
        # kann der erste soffice-Start im CI blockieren.
        run: |
          brew install --cask libreoffice
          sudo xattr -dr com.apple.quarantine /Applications/LibreOffice.app || true

      - name: Diagnose macOS-Bundle-Layout
        # Verifiziert die Layout-Annahmen aus build.gradle (MacOS/, Resources/java/)
        run: |
          echo "::group::Contents/MacOS"
          ls /Applications/LibreOffice.app/Contents/MacOS/ | head -30
          echo "::endgroup::"
          echo "::group::Contents/Resources/java"
          ls /Applications/LibreOffice.app/Contents/Resources/java/ | head -30
          echo "::endgroup::"
          "$JAVA_HOME/bin/java" -version

      - name: LibreOffice-Binaries in PATH aufnehmen
        # OfficeStarter (soffice) und BaseCalcUITest (unopkg) rufen beide aus dem PATH auf.
        run: echo "/Applications/LibreOffice.app/Contents/MacOS" >> "$GITHUB_PATH"

      - name: Download OXT artifact
        uses: actions/download-artifact@v4
        with:
          name: oxt
          path: build/distributions

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Headless-Diagnose (LO-Core vs. Extension)
        # Isoliert den Hänger aus den UITests: --convert-to lädt ein Dokument und
        # aktiviert dabei auch installierte Extensions – einmal ohne (frisches Profil),
        # einmal mit installierter PTM-Extension (Default-Profil). Hängt erst Test 2,
        # liegt der Blocker in der Extension-Aktivierung; hängt schon Test 1, in LO
        # selbst. Bei Hänger: Java-Thread-Dump (jcmd, eingebettete soffice-JVM) +
        # nativer Stack (sample), dann hartes Fail.
        timeout-minutes: 12
        run: |
          printf 'Smoke' > /tmp/probe.txt

          beende_soffice() { pkill -f soffice 2>/dev/null || true; sleep 3; }

          dump_und_fail() {
            echo "::error::$1"
            SOFFICE_PID=$(pgrep -f soffice | head -1 || true)
            if [ -n "$SOFFICE_PID" ]; then
              echo "=== jcmd Thread.print (soffice PID $SOFFICE_PID) ==="
              "$JAVA_HOME/bin/jcmd" "$SOFFICE_PID" Thread.print 2>&1 | head -300 || true
              echo "=== sample (nativer Stack) ==="
              sample "$SOFFICE_PID" 5 -file /tmp/soffice-sample.txt 2>/dev/null || true
              head -120 /tmp/soffice-sample.txt 2>/dev/null || true
            fi
            beende_soffice
            exit 1
          }

          konvertiere() { # $1: zusätzliche soffice-Args, $2: Timeout in Sekunden
            rm -f /tmp/probe.pdf
            # shellcheck disable=SC2086
            soffice --headless $1 --convert-to pdf /tmp/probe.txt --outdir /tmp &
            SPID=$!
            n=0
            while kill -0 "$SPID" 2>/dev/null; do
              sleep 5; n=$((n+5))
              if [ "$n" -ge "$2" ]; then return 1; fi
            done
            [ -f /tmp/probe.pdf ]
          }

          echo "== Test 1: frisches Profil OHNE Extension =="
          konvertiere "-env:UserInstallation=file:///tmp/lo-frisch" 180 \
            || dump_und_fail "LO headless hängt bereits OHNE Extension (LO-Core-Problem)"
          beende_soffice
          echo "Test 1 OK"

          echo "== Test 2: Default-Profil MIT PTM-Extension =="
          unopkg add -f build/distributions/*.oxt
          konvertiere "" 180 \
            || dump_und_fail "LO headless hängt MIT Extension (Blocker in der Extension-Aktivierung)"
          beende_soffice
          echo "Test 2 OK – LO headless funktioniert mit installierter Extension"

      - name: Run MeldeListeSheetUITest (Supermelee-Meldeliste)
        # -x reinstallExtension: OXT kommt fertig aus dem Artifact, die Installation macht
        #   BaseCalcUITest.installExtension() selbst (unopkg remove/add aus dem PATH);
        #   kappt zugleich buildOXT/compileIdl, die auf macOS nicht laufen können.
        # -x buildFrontend/-x buildSpielerDbFrontend: processResources hängt an den
        #   npm-Builds; die statischen Frontend-Ressourcen braucht dieser Test nicht.
        # -Puitest.requireOffice=true: nicht startbares LibreOffice = harter Fehler,
        #   sonst würden die Tests nur geskippt und der Lauf wäre fälschlich grün.
        # -Puitest.timeout: macOS-Runner sind deutlich langsamer als lokale Rechner.
        # Watchdog statt nur Step-Timeout: hängt der Lauf nach 12 min noch, werden
        #   Thread-Dumps ALLER Java-Prozesse (Test-JVM + eingebettete soffice-JVM)
        #   und ein nativer sample-Stack gezogen, dann wird hart abgebrochen.
        timeout-minutes: 18
        run: |
          ./gradlew uiTests \
            --tests "de.petanqueturniermanager.supermelee.meldeliste.MeldeListeSheetUITest" \
            -x reinstallExtension -x buildFrontend -x buildSpielerDbFrontend \
            -Puitest.requireOffice=true \
            -Puitest.timeout="5 m" \
            -Puitest.verbose=true \
            -Dorg.gradle.java.home="$JAVA_HOME" --no-daemon --stacktrace &
          GRADLE_PID=$!
          n=0
          while kill -0 "$GRADLE_PID" 2>/dev/null; do
            sleep 10; n=$((n+10))
            if [ "$n" -ge 720 ]; then
              echo "::error::Testlauf hängt nach 12 min – Thread-Dumps aller JVMs"
              "$JAVA_HOME/bin/jcmd" -l || true
              for pid in $("$JAVA_HOME/bin/jcmd" -l 2>/dev/null | awk '{print $1}'); do
                echo "=== Thread-Dump PID $pid ==="
                "$JAVA_HOME/bin/jcmd" "$pid" VM.command_line 2>/dev/null | head -3 || true
                "$JAVA_HOME/bin/jcmd" "$pid" Thread.print 2>&1 | head -400 || true
              done
              SOFFICE_PID=$(pgrep -f soffice | head -1 || true)
              if [ -n "$SOFFICE_PID" ]; then
                echo "=== sample soffice (nativer Stack) ==="
                sample "$SOFFICE_PID" 5 -file /tmp/soffice-sample.txt 2>/dev/null || true
                head -120 /tmp/soffice-sample.txt 2>/dev/null || true
              fi
              pkill -f soffice 2>/dev/null || true
              kill "$GRADLE_PID" 2>/dev/null || true
              exit 1
            fi
          done
          wait "$GRADLE_PID"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoketest-report-macos
          path: |
            build/reports/tests/
            build/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload LibreOffice-Profil (Fehlerdiagnose)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lo-profil-macos
          path: ~/Library/Application Support/LibreOffice/4/
          if-no-files-found: ignore
          retention-days: 7
