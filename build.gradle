
plugins {
    id 'java'
    id 'application'
}

group = 'de.petanqueturniermanager'
// Version aus description.xml lesen
def descriptionXml = new groovy.xml.XmlSlurper(false, false).parse(file('description.xml'))
version = descriptionXml.version.@value.text()

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
    withJavadocJar()
    withSourcesJar()
}

repositories {
    mavenCentral()
}

// Configuration properties
def libreOfficePath = findProperty('libreoffice.path') ?: '/usr/lib/libreoffice'
def libreOfficeClassesPath = "${libreOfficePath}/program/classes"
def extensionId = descriptionXml.identifier.@value.text()

configurations {
    libreoffice
}

dependencies {

    implementation 'com.google.guava:guava:33.5.0-jre'
    implementation 'org.apache.commons:commons-lang3:3.20.0'
    implementation 'org.apache.commons:commons-collections4:4.5.0'
    implementation 'org.apache.commons:commons-text:1.15.0'
    implementation 'commons-io:commons-io:2.21.0'
    implementation 'org.apache.logging.log4j:log4j-core:2.25.3'
    implementation 'org.kohsuke:github-api:1.330'
    implementation 'com.google.code.gson:gson:2.13.2'
    implementation 'io.github.g00fy2:versioncompare:1.5.0'
    implementation 'org.jsoup:jsoup:1.22.1'
    implementation 'com.opencsv:opencsv:5.12.0'

    // LibreOffice SDK dependencies - using local installation
    compileOnly fileTree(dir: libreOfficeClassesPath, include: ['*.jar'])
    compileOnly files(
        "${libreOfficeClassesPath}/ridl.jar",
        "${libreOfficeClassesPath}/unoil.jar",
        "${libreOfficeClassesPath}/jurt.jar",
        "${libreOfficeClassesPath}/juh.jar"
    )
    
    // LibreOffice SDK für Tests - use testImplementation so classes are available at runtime
    testImplementation fileTree(dir: libreOfficeClassesPath, include: ['*.jar'])
    testImplementation files(
        "${libreOfficeClassesPath}/ridl.jar",
        "${libreOfficeClassesPath}/unoil.jar",
        "${libreOfficeClassesPath}/jurt.jar",
        "${libreOfficeClassesPath}/juh.jar"
    )

    testImplementation 'org.junit.jupiter:junit-jupiter:5.14.3'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testImplementation 'org.assertj:assertj-core:3.27.6'
    testImplementation 'org.mockito:mockito-core:5.21.0'
}

configurations.all {
	exclude group: 'commons-collections', module: 'commons-collections'
}

application {
    mainClass = 'de.petanqueturniermanager.SheetRunner'
}

tasks.register('cleanCache', Delete) {
    delete "dist/.ooo-debug/user/uno_packages/cache"
}

tasks.register('copyRuntimeLibs', Sync) {
    group = 'LibreOffice'
    description = 'Kopiert Runtime-Dependencies für die OXT'
    from configurations.runtimeClasspath
    into layout.buildDirectory.dir('runtime-libs')
}

// Task zum Erstellen des JAR mit UNO Registration
tasks.register('buildPluginJar', Jar) {
    group = 'LibreOffice'
    description = 'Erstellt das JAR mit UNO Registration und Class-Path zu libs'
    dependsOn classes, 'copyRuntimeLibs'
    archiveFileName.set("${project.name}.jar")

    from sourceSets.main.output

    // UNO components-Datei ins JAR META-INF (LibreOffice Standard-Location)
    from('.') {
        include 'PetanqueTurnierManager.components'
        into 'META-INF'
    }

    manifest {
        attributes(
            'RegistrationClassName': 'de.petanqueturniermanager.comp.RegistrationHandler',
            'Class-Path': configurations.runtimeClasspath.collect {
                "libs/${it.name}"
            }.join(' ')
        )
    }
}

// Task zum Erstellen der OXT-Datei (LibreOffice Extension)
// IDL zu RDB kompilieren (UNO Type Registry für AddIn-Funktionen)
tasks.register('compileIdl', Exec) {
    group = 'LibreOffice'
    description = 'Kompiliert IDL-Dateien zu einer RDB Type-Registry'
    def unoidlWrite = "${libreOfficePath}/sdk/bin/unoidl-write"
    def typesRdb = "${libreOfficePath}/program/types.rdb"
    def offapiRdb = "${libreOfficePath}/program/types/offapi.rdb"
    def idlFile = file('idl/de/petanqueturniermanager/AddInGlobal.idl')
    def outputRdb = layout.buildDirectory.file('rdb/AddInGlobal.rdb').get().asFile

    inputs.file idlFile
    outputs.file outputRdb

    doFirst {
        outputRdb.parentFile.mkdirs()
    }
    commandLine unoidlWrite, typesRdb, offapiRdb, idlFile, outputRdb
}

tasks.register('buildOXT', Zip) {
    group = 'LibreOffice'
    description = 'Erstellt die OXT-Datei (LibreOffice Extension)'
    dependsOn 'buildPluginJar', 'copyRuntimeLibs', 'compileIdl', 'buildFrontend'
    archiveFileName.set("${project.name}-${version}.oxt")
    destinationDirectory.set(layout.buildDirectory.dir('distributions'))

    // JAR-Datei hinzufügen
    from(tasks.named('buildPluginJar', Jar).flatMap { it.archiveFile }) {
        into ''
    }

    // META-INF manifest
    from('META-INF') {
        into 'META-INF'
    }

    // Description and configuration files
    from('.') {
        include 'description.xml'
    }

    from('description') {
        include '*.txt'
        into 'description'
    }

    // Registry configuration (XCU files)
    from('registry') {
        into 'registry'
    }

    // Images (OXT-Root)
    from('images') {
        into 'images'
    }

    // Logo für Sidebar-Deck-Icon: %origin% in Sidebar.xcu ist relativ zur XCU-Datei,
    // daher muss das Bild auch unter registry/org/openoffice/Office/UI/images/ liegen.
    from('images') {
        include 'petanqueturniermanager-logo-32px.png'
        into 'registry/org/openoffice/Office/UI/images'
    }

    // Toolbar-Icons: %origin% in Addons_Z2_Toolbar.xcu ist relativ zur XCU-Datei,
    // daher müssen die Bilder auch unter registry/org/openoffice/Office/images/ liegen.
    from('images') {
        include 'toolbar-*.png'
        into 'registry/org/openoffice/Office/images'
    }

    // Runtime dependencies (libs)
    from(layout.buildDirectory.dir('runtime-libs')) {
        into 'libs'
    }

    // IDL files
    from('idl') {
        into 'idl'
    }

    // RDB Type Registry (kompiliert aus IDL)
    from(layout.buildDirectory.dir('rdb')) {
        include '*.rdb'
    }
}

// Task zum Installieren der Extension in LibreOffice
tasks.register('installExtension', Exec) {
    group = 'LibreOffice'
    description = 'Installiert die erstellte Extension in LibreOffice'
    dependsOn 'buildOXT'
    mustRunAfter 'uninstallExtension'
    def oxtFile = layout.buildDirectory.file("distributions/${project.name}-${version}.oxt").get().asFile
    commandLine "${libreOfficePath}/program/unopkg", 'add', '-f', oxtFile

    doFirst {
        println "Installiere Extension: ${oxtFile}"
    }
}

// Task zum Deinstallieren der Extension
tasks.register('uninstallExtension', Exec) {
    group = 'LibreOffice'
    description = 'Deinstalliert die Extension aus LibreOffice'
    commandLine "${libreOfficePath}/program/unopkg", 'remove', extensionId
    ignoreExitValue = true
    errorOutput = new ByteArrayOutputStream()
    standardOutput = new ByteArrayOutputStream()

    doFirst {
        println "Deinstalliere Extension: ${extensionId}"
    }
    doLast {
        if (executionResult.get().exitValue != 0) {
            println "Hinweis: Extension war nicht installiert, überspringe Deinstallation."
        }
    }
}

// Task zum Neuinstallieren
tasks.register('reinstallExtension') {
    group = 'LibreOffice'
    description = 'De-/Neuinstallation der Extension'
    dependsOn 'uninstallExtension', 'installExtension'
}

// Debug-Task: Startet LibreOffice mit Debug-Port
tasks.register('debugLibreOffice', Exec) {
    group = 'LibreOffice'
    description = 'Startet LibreOffice im Debug-Modus mit JDWP'
    dependsOn 'reinstallExtension'

    environment 'JAVA_TOOL_OPTIONS', '-agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=*:5005'

    commandLine "${libreOfficePath}/program/soffice", '--calc'

    doFirst {
        println "LibreOffice wird im Debug-Modus gestartet..."
        println "Verbinde deinen Debugger mit Port 5005"
    }
}

// Task zum Starten von LibreOffice
tasks.register('runLibreoffice', Exec) {
    group = 'LibreOffice'
    description = 'Startet LibreOffice Calc nach Neuinstallation der Extension'
    dependsOn 'reinstallExtension'

    commandLine "${libreOfficePath}/program/soffice", '--calc'

    doFirst {
        println "Starte LibreOffice Calc..."
    }
}

// UITests benötigen die aktuelle OXT installiert.
// Standard: nur Unit-Tests (kein Reinstall nötig).
// Mit -PuitTests=true werden auch UITests ausgeführt und die Extension reinstalliert.
def mitUiTests = project.hasProperty('uitTests') && project.uitTests == 'true'

test {
    if (mitUiTests) {
        dependsOn 'reinstallExtension'
        // UITests nie aus dem Build-Cache laden – LibreOffice-Zustand kann sich geändert haben
        outputs.upToDateWhen { false }
    }
    // UITests starten LibreOffice auf Port 8100 – nur ein Worker gleichzeitig erlaubt
    maxParallelForks = 1
    // Im Gradle-Build immer headless; manuelle IDE-Starts verwenden headless=false (Standard)
    systemProperty 'uitest.headless', 'true'
    useJUnitPlatform()
    if (!mitUiTests) {
        // UITests ausschließen wenn kein -PuitTests=true gesetzt
        exclude '**/*UITest*'
    }
    // Hängende UITests nach 3 Minuten pro Test abbrechen (soffice-Verbindung kann blockieren)
    systemProperty 'junit.jupiter.execution.timeout.default', '3 m'
}

// UITests (ohne Beispielturnier): führt alle *UITest*-Klassen durch, außer dem Beispielturnier-Package.
// Entspricht ./gradlew test -PuitTests=true, aber als eigenständiger Task ohne Property-Pflicht.
tasks.register('uiTests', Test) {
    group = 'LibreOffice'
    description = 'Führt alle normalen UI-Tests durch (ohne Beispielturnier-Tests). Benötigt reinstallExtension.'
    dependsOn 'reinstallExtension'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    outputs.upToDateWhen { false }
    maxParallelForks = 1
    systemProperty 'uitest.headless', 'true'
    systemProperty 'junit.jupiter.execution.timeout.default', '3 m'
    useJUnitPlatform()
    include '**/*UITest*'
    exclude 'de/petanqueturniermanager/beispielturnier/**'
}

// Beispielturnier-Tests: führen alle registrierten Beispielturniere als UI-Test durch.
// Unterstützte Locales: de (Standard), en, nl, fr, es.
// Verwendung:
//   ./gradlew beispielturnierTests              # Deutsch
//   ./gradlew beispielturnierTests -Plocale=en  # Englisch
//   ./gradlew beispielturnierTests -Plocale=nl  # Niederländisch
tasks.register('beispielturnierTests', Test) {
    group = 'LibreOffice'
    description = 'Führt alle Beispielturnier-UITests durch. Locale wählbar: -Plocale=de|en|nl|fr|es'
    dependsOn 'reinstallExtension'
    // Test-Quelldateien und Classpath aus dem test-SourceSet laden
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    // Nie aus Cache laden – LibreOffice-Zustand kann sich geändert haben
    outputs.upToDateWhen { false }
    // LibreOffice auf Port 8100 – nur ein Worker gleichzeitig
    maxParallelForks = 1
    systemProperty 'uitest.headless', 'true'
    systemProperty 'beispielturnier.locale', project.hasProperty('locale') ? project.locale : 'de'
    systemProperty 'junit.jupiter.execution.timeout.default', '5 m'
    useJUnitPlatform()
    // Nur Tests im beispielturnier-Package und formulex-Rangliste ausführen
    filter {
        includeTestsMatching 'de.petanqueturniermanager.beispielturnier.*'
        includeTestsMatching 'de.petanqueturniermanager.formulex.rangliste.*'
    }
    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams = false
    }
}

// Druckvorschau-Crash-Reproduktion: startet LO mit sichtbarem Fenster (ohne --headless),
// damit VCL-Toolbar-Controller aktiv sind und addStatusListener() aufgerufen wird.
// Verwendung: ./gradlew druckvorschauNative
tasks.register('druckvorschauNative', Test) {
    group = 'LibreOffice'
    description = 'Führt DruckvorschauUITest mit sichtbarem LO-Fenster durch (kein --headless). Benötigt Display.'
    dependsOn 'reinstallExtension'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    outputs.upToDateWhen { false }
    maxParallelForks = 1
    // uitest.headless=false → OfficeStarter startet LO OHNE --headless
    systemProperty 'uitest.headless', 'false'
    systemProperty 'junit.jupiter.execution.timeout.default', '3 m'
    useJUnitPlatform()
    filter {
        includeTestsMatching 'de.petanqueturniermanager.DruckvorschauUITest'
    }
    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams = true
    }
}

// LO mit SAL_LOG (C++-Logging) für Crash-Diagnose starten.
// Verwendung: ./gradlew loDebugLog
// Analyse: build/lo-crash/sal.log öffnen, GLib-GObject-CRITICAL und Timing prüfen
tasks.register('loDebugLog', Exec) {
    group = 'LibreOffice'
    description = 'Startet LibreOffice mit SAL_LOG (C++) für Crash-Diagnose. Druckvorschau manuell testen.'
    dependsOn 'reinstallExtension'

    def loLogDir = file("${buildDir}/lo-crash")
    def salLogFile = file("${loLogDir}/sal.log")

    // SAL_LOG-Format: +WARN = alle C++-Warnungen; +INFO.vcl.gtk = GTK/VCL-Widget-Lifecycle
    environment 'SAL_LOG', '+WARN+INFO.vcl.gtk'

    // LO starten; stderr in Datei + Terminal gleichzeitig
    commandLine 'bash', '-c', """
        mkdir -p '${loLogDir}'
        '${libreOfficePath}/program/soffice' --calc 2>&1 | tee '${salLogFile}'
    """

    doFirst {
        println "═══════════════════════════════════════════════════════"
        println " SAL_LOG → ${salLogFile}"
        println "═══════════════════════════════════════════════════════"
    }
}

// LO mit XWayland (GDK_BACKEND=x11) starten – prüft ob der Druckvorschau-Crash
// Wayland-spezifisch ist. Wenn kein Crash: Ursache ist im LO-Wayland-Backend.
// Verwendung: ./gradlew loX11
tasks.register('loX11', Exec) {
    group = 'LibreOffice'
    description = 'Startet LibreOffice mit GDK_BACKEND=x11 (XWayland). Druckvorschau-Crash-Test.'
    dependsOn 'reinstallExtension'

    def loLogDir = file("${buildDir}/lo-crash")
    def salLogFile = file("${loLogDir}/sal-x11.log")

    environment 'GDK_BACKEND', 'x11'
    environment 'SAL_LOG', '+WARN'

    commandLine 'bash', '-c', """
        mkdir -p '${loLogDir}'
        '${libreOfficePath}/program/soffice' --calc 2>&1 | tee '${salLogFile}'
    """

    doFirst {
        println "═══════════════════════════════════════════════════════"
        println " GDK_BACKEND=x11 (XWayland) – kein Wayland-GTK"
        println " SAL_LOG → ${salLogFile}"
        println " Test: Druckvorschau öffnen + schließen"
        println " Kein Crash → Wayland-GTK-Bug in LO"
        println "═══════════════════════════════════════════════════════"
    }
}

// LO unter gdb starten für interaktive Crash-Analyse (Stack Trace).
// Verwendung: ./gradlew loGdb
//   → LO öffnet sich; Druckvorschau öffnen + schließen
//   → Bei Crash: in gdb "bt full" eingeben → Stack Trace zeigt LO-Crash-Ursache
//   → "q" zum Beenden
tasks.register('loGdb', Exec) {
    group = 'LibreOffice'
    description = 'Startet LibreOffice unter gdb für interaktive Crash-Analyse.'
    dependsOn 'reinstallExtension'

    def loLogDir = file("${buildDir}/lo-crash")

    commandLine 'bash', '-c', """
        mkdir -p '${loLogDir}'
        cd '${loLogDir}'
        gdb -ex 'handle SIGSEGV stop' \\
            -ex 'handle SIGABRT stop' \\
            -ex 'run --calc' \\
            '${libreOfficePath}/program/soffice.bin'
    """

    doFirst {
        println "═══════════════════════════════════════════════════════"
        println " gdb: interaktive Crash-Analyse"
        println " 1. LO startet – Druckvorschau öffnen + schließen"
        println " 2. Bei Crash: 'bt full' eingeben → Stack Trace"
        println " 3. 'q' zum Beenden"
        println "═══════════════════════════════════════════════════════"
    }
}

// Führt alle Tests nacheinander durch: Unit-Tests, UI-Tests, Beispielturnier-Tests.
// Locale für Beispielturnier wählbar: -Plocale=de|en|nl|fr|es (Standard: de)
tasks.register('runAllTests') {
    group = 'verification'
    description = 'Führt alle Tests durch: Unit-Tests, UI-Tests (ohne Beispielturnier) und Beispielturnier-Tests.'
    dependsOn 'test', 'uiTests', 'beispielturnierTests'
}
tasks.named('uiTests').configure { mustRunAfter('test') }
tasks.named('beispielturnierTests').configure { mustRunAfter('uiTests') }

// Task: Bauen, installieren und Calc im Hintergrund starten (Gradle blockiert nicht)
tasks.named('buildOXT').configure { mustRunAfter('clean') }
tasks.register('startCalc') {
    group = 'LibreOffice'
    description = 'Baut OXT frisch (clean), installiert Extension und startet LibreOffice Calc (non-blocking)'
    dependsOn 'clean', 'reinstallExtension'

    doLast {
        println "Starte LibreOffice Calc..."
        new ProcessBuilder("${libreOfficePath}/program/soffice", '--calc')
            .inheritIO()
            .start()
    }
}

// ===================================================
// Frontend (React/Vite)
// ===================================================

tasks.register('buildFrontend', Exec) {
    group = 'LibreOffice'
    description = 'Baut das React-Frontend (npm run build) und legt den Output in src/main/resources ab'
    workingDir 'frontend'
    def npmCmd = findProperty('npm.path') ?: 'npm'
    def nodeDir = npmCmd != 'npm' ? new File(npmCmd).parentFile.absolutePath : null
    if (nodeDir) {
        environment 'PATH', "${nodeDir}:${System.getenv('PATH') ?: ''}"
    }
    commandLine npmCmd, 'run', 'build'
    inputs.dir('frontend/src')
    inputs.file('frontend/package.json')
    inputs.file('frontend/vite.config.js')
    outputs.dir('src/main/resources/de/petanqueturniermanager/webserver/static')
}

processResources.dependsOn 'buildFrontend'

// Build-Task
tasks.register('buildPlugin') {
    group = 'LibreOffice'
    description = 'High-level Task: Baut die OXT und zeigt Ausgabepfad'
    dependsOn 'buildOXT'

    doLast {
        println "Plugin erfolgreich gebaut: ${layout.buildDirectory.get().asFile}/distributions/${project.name}-${version}.oxt"
    }
}

// ===================================================
// i18n / XCU Übersetzung
// ===================================================

