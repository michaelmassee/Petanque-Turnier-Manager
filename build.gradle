        ]

        // ---- DeepL-Übersetzungsfunktion ----
        def deeplUebersetzen = { String text, String zielSprache ->
            try {
                def client = java.net.http.HttpClient.newHttpClient()
                def body = "auth_key=${java.net.URLEncoder.encode(deeplKey, 'UTF-8')}" +
                           "&text=${java.net.URLEncoder.encode(text, 'UTF-8')}" +
                           "&target_lang=${zielSprache.toUpperCase()}"
                def request = java.net.http.HttpRequest.newBuilder()
                    .uri(java.net.URI.create('https://api-free.deepl.com/v2/translate'))
                    .header('Content-Type', 'application/x-www-form-urlencoded')
                    .POST(java.net.http.HttpRequest.BodyPublishers.ofString(body))
                    .build()
                def response = client.send(request, java.net.http.HttpResponse.BodyHandlers.ofString())
                if (response.statusCode() == 200) {
                    def json = new groovy.json.JsonSlurper().parseText(response.body())
                    return json.translations[0].text as String
                }
                logger.warn("DeepL HTTP ${response.statusCode()} für '${text.take(40)}' -> ${zielSprache}")
            } catch (Exception e) {
                logger.warn("DeepL-Aufruf fehlgeschlagen: ${e.message}")
            }
            return null
        }

        // ---- Übersetzung für einen Text + Zielsprache holen ----
        def uebersetzungHolen = { String quelltext, String zielSprache ->
            // 1. Fallback-Wörterbuch (DE als Schlüssel, exakter Match)
            def eintrag = woerterbuch[quelltext]
            if (eintrag?[zielSprache]) return eintrag[zielSprache] as String
            // 2. DeepL (wenn API-Key vorhanden)
            if (deeplKey) {
                def ergebnis = deeplUebersetzen(quelltext, zielSprache)
                if (ergebnis) return ergebnis
            }
            // 3. Quelltext unverändert kopieren
            return quelltext
        }

        // ---- XML-Sonderzeichen escapen ----
        def xmlEscape = { String s ->
            s.replace('&', '&amp;').replace('<', '&lt;').replace('>', '&gt;')
        }

        // ---- Einzelne XCU-Datei verarbeiten (text-basiert) ----
        // Vorteil: Originalformatierung bleibt erhalten; git diff zeigt nur neue Zeilen.
        def xcuDateiVerarbeiten = { File xcuDatei ->
            def zeilen = xcuDatei.readLines('UTF-8')
            def ausgabe = [] as List<String>
            boolean geaendert = false
            boolean inProp = false
            String propName = null
            Map<String, String> gefundeneSprachenInProp = [:]
            String einzug = null  // Einzug der value-Zeilen, wird aus erster gefundener value-Zeile übernommen

            for (String zeile : zeilen) {
                if (!inProp) {
                    def m = zeile =~ /(\s*)<prop\s[^>]*oor:name="([^"]+)"/
                    if (m && uebersetzbare.contains(m[0][2] as String)) {
                        inProp = true
                        propName = m[0][2] as String
                        gefundeneSprachenInProp = [:]
                        einzug = null
                    }
                    ausgabe << zeile
                } else {
                    // <value xml:lang="xx">text</value> erkennen
                    def valueM = zeile =~ /^(\s*)<value\s+xml:lang="([^"]+)"[^>]*>(.*?)<\/value>\s*$/
                    if (valueM) {
                        if (einzug == null) einzug = valueM[0][1] as String
                        gefundeneSprachenInProp[valueM[0][2] as String] = valueM[0][3] as String
                    }

                    // </prop> → fehlende Sprachen einfügen, dann Zeile ausgeben
                    if (zeile =~ /^\s*<\/prop>/) {
                        def fehlendeSprachcodes = zielSprachen.findAll { !gefundeneSprachenInProp.containsKey(it) }
                        if (fehlendeSprachcodes && gefundeneSprachenInProp) {
                            // Quelltext: DE bevorzugt, dann EN, dann erste verfügbare Sprache
                            String quelltext = gefundeneSprachenInProp['de']
                                ?: gefundeneSprachenInProp['en']
                                ?: gefundeneSprachenInProp.values().first()
                            if (quelltext?.trim()) {
                                def zeilenEinzug = einzug ?: '\t\t\t\t\t'
                                fehlendeSprachcodes.each { sprache ->
                                    String uebersetzt = uebersetzungHolen(quelltext, sprache)
                                    String neueZeile = "${zeilenEinzug}<value xml:lang=\"${sprache}\">${xmlEscape(uebersetzt)}</value>"
                                    if (trockenLauf) {
                                        println "  [${xcuDatei.name}] <prop ${propName}>: +${sprache} = \"${uebersetzt}\""
                                    } else {
                                        ausgabe << neueZeile
                                        geaendert = true
                                    }
                                }
                            }
                        }
                        inProp = false
                        propName = null
                    }
                    ausgabe << zeile
                }
            }

            if (geaendert) {
                xcuDatei.withWriter('UTF-8') { writer ->
                    ausgabe.each { writer.writeLine(it) }
                }
                println "  Aktualisiert: ${xcuDatei.name}"
            }
            return geaendert
        }

        // ---- Hauptloop ----
        if (trockenLauf) println "=== DRY-RUN Modus (keine Dateien werden geändert) ==="
        if (deeplKey) println "=== DeepL API-Key vorhanden ==="
        else         println "=== Kein DeepL-Key – nur Fallback-Wörterbuch aktiv ==="

        def xcuDateien = fileTree('registry').include('**/*.xcu').files.sort { it.name }
        println "\nVerarbeite ${xcuDateien.size()} XCU-Dateien in registry/...\n"

        int anzahlGeaendert = 0
        xcuDateien.each { datei ->
            if (xcuDateiVerarbeiten(datei)) anzahlGeaendert++
        }

        println ""
        if (trockenLauf) println "DRY-RUN abgeschlossen – ${xcuDateien.size()} Dateien geprüft, keine Änderungen geschrieben."
        else             println "${anzahlGeaendert} von ${xcuDateien.size()} Dateien aktualisiert."
        if (anzahlGeaendert > 0 && !trockenLauf) println "Tipp: 'git diff registry/' zeigt alle eingefügten Übersetzungen."
    }
}
