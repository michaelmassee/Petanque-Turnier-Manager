            'Neue Spielrunde'                        : [de: 'Neue Spielrunde',                       en: 'New Round',                                 es: 'Nueva ronda',                                       fr: 'Nouveau tour',                                   nl: 'Nieuwe ronde'],
            'Spielrunde neu auslosen'                : [de: 'Spielrunde neu auslosen',               en: 'Re-draw Round',                             es: 'Volver a sortear la ronda',                         fr: 'Retirer la manche',                              nl: 'Ronde opnieuw loten'],
            'Rangliste'                              : [de: 'Rangliste',                             en: 'Ranking',                                   es: 'Clasificación',                                     fr: 'Classement',                                     nl: 'Ranglijst'],
            'Rangliste Sortieren'                    : [de: 'Rangliste Sortieren',                   en: 'Sort Ranking',                              es: 'Ordenar clasificación',                             fr: 'Trier le classement',                            nl: 'Ranglijst sorteren'],
            'Rangliste sortieren'                    : [de: 'Rangliste sortieren',                   en: 'Sort Ranking',                              es: 'Ordenar clasificación',                             fr: 'Trier le classement',                            nl: 'Ranglijst sorteren'],
