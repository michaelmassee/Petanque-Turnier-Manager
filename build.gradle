
plugins {
    id 'java'
    id 'application'
    id 'com.github.spotbugs' version '6.0.26'
    id 'net.ltgt.errorprone' version '4.1.0'
}

group = 'de.petanqueturniermanager'
// Version aus description.xml lesen
def descriptionXml = new groovy.xml.XmlSlurper(false, false).parse(file('description.xml'))
version = descriptionXml.version.@value.text()

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
    withJavadocJar()
    withSourcesJar()
}

// ===================================================
// Compiler-Lints (Block B1 aus architektur-robust-analyse.md)
// ===================================================
// Produktions-Source: -Xlint:all -Werror, mit expliziten Ausnahmen.
// Neue Warnings in NICHT-suppressten Kategorien brechen den Build.
//
// Dauerhafte Suppressions (bewusste Architekturentscheidung, kein TODO):
//   classfile    — externe Lib (github-api 1.330) referenziert SuppressFBWarnings/
//                  WithBridgeMethods, die nicht im Classpath sind. Nicht reparierbar
//                  von uns aus.
//   this-escape  — ~70 Stellen über die ganze Sheet-/Sidebar-Hierarchie. Muster:
//                  Konstruktor reicht `this` an assoziierte Objekte weiter
//                  (z.B. `propertiesSpalte = new XyzPropertiesSpalte(this)`) oder
//                  ruft abstrakte Lifecycle-Methoden (`doCreate()`, `init()`).
//                  Subklassen-Hierarchien sind plugin-intern und geschlossen,
//                  Initialisierungs-Reihenfolge ist etabliert; kein bekannter
//                  Init-Order-Bug. Refactoring (Factory + post-construct init)
//                  wäre invasiv ohne UI-CI als Sicherheitsnetz und hat keinen
//                  erkennbaren Robustheits-Gewinn.
tasks.named('compileJava').configure {
    options.compilerArgs.addAll([
        '-Xlint:all,-classfile,-this-escape',
        '-Werror'
    ])
}

// Test-Source: nur Warnings (kein -Werror). Test-Code wird seltener angefasst,
// Migration zu strikten Lints erfolgt parallel zur Produktiv-Source.
tasks.named('compileTestJava').configure {
    options.compilerArgs.addAll([
        '-Xlint:all,-classfile,-this-escape'
    ])
}

// ===================================================
// SpotBugs (Block B2 aus architektur-robust-analyse.md)
// ===================================================
// Initialer Lauf zur Bestandsaufnahme: ignoreFailures = true, damit Findings
// den Build nicht brechen. HTML- und XML-Report werden erzeugt; XML kann
// später als Baseline-Excludefilter dienen ("keine neuen Findings").
//
// Aufruf:
//   ./gradlew spotbugsMain   — nur Produktions-Source
//   ./gradlew check          — schließt SpotBugs für Main + Test ein
//
// Reports: build/reports/spotbugs/main.{html,xml}
spotbugs {
    toolVersion = '4.9.6'       // Java 25 (class file 69) wird ab 4.9.x unterstützt
    ignoreFailures = true       // Bestandsaufnahme; spätere Verschärfung via excludeFilter
    effort = 'max'
    reportLevel = 'medium'
    excludeFilter = file('config/spotbugs/exclude.xml')
}

tasks.withType(com.github.spotbugs.snom.SpotBugsTask).configureEach {
    reports {
        html { required = true }
        xml  { required = true }
    }
}

// SpotBugs läuft auf Test-Code selten lohnend (Mocks/Asserts erzeugen
// false-positives). Vorerst nur main analysieren.
tasks.named('spotbugsTest').configure {
    enabled = false
}

// ===================================================
// NullAway via ErrorProne (Block B4 aus architektur-robust-analyse.md)
// ===================================================
// Annotated-Default — Pilot auf `helper.random` (kleines, neues Paket mit
// nur einer Klasse). Methoden/Felder dort gelten als non-null, sofern nicht
// explizit @Nullable annotiert. JSpecify-Mode aktiv, damit @org.jspecify.*
// statt @javax.annotation.Nullable verwendet wird.
//
// Backlog: weitere helper-Subpakete schrittweise hinzufügen
// (siehe NullAway:AnnotatedPackages — komma-separierte Liste). Im
// helper-Wurzelpaket erzeugt der Annotated-Default heute ~100 Findings;
// diese müssen vor einer breiteren Aktivierung als @Nullable annotiert oder
// auf non-null hart gemacht werden.
//
// ErrorProne ist auf Java 25 (Class-File 69) noch jung — bei Inkompatibilität
// kann der gesamte Block per `-PdisableErrorProne=true` ausgeschaltet werden.
def errorProneAktiviert = !project.hasProperty('disableErrorProne')

import net.ltgt.gradle.errorprone.CheckSeverity

tasks.withType(JavaCompile).configureEach {
    options.errorprone.enabled = errorProneAktiviert
    if (errorProneAktiviert) {
        // Standard-ErrorProne-Checks deaktivieren (Bestandsaufnahme separat),
        // nur NullAway scharf schalten.
        options.errorprone.disableAllChecks = true
        options.errorprone.check('NullAway', CheckSeverity.ERROR)
        options.errorprone.option('NullAway:AnnotatedPackages', 'de.petanqueturniermanager.helper.random,de.petanqueturniermanager.spielerdb.webview,de.petanqueturniermanager.comp.newrelease')
        options.errorprone.option('NullAway:JSpecifyMode', 'true')
    }
}

// ErrorProne fasst Tests bewusst nicht an — Mocks/Reflection produzieren
// massive False-Positives.
tasks.named('compileTestJava').configure {
    options.errorprone.enabled = false
}

repositories {
    mavenCentral()
}

// Configuration properties
// OS-bewusste LibreOffice-Pfadauflösung: macOS-App-Bundle hat ein anderes Layout
// (Binaries unter Contents/MacOS, UNO-JARs unter Contents/Resources/java) als die
// Linux-Installation (program/ bzw. program/classes). Override via -Plibreoffice.path
// bleibt möglich und muss dann zum jeweiligen OS-Layout passen.
def isMacOS = System.getProperty('os.name').toLowerCase().contains('mac')
def libreOfficePath = findProperty('libreoffice.path')
        ?: (isMacOS ? '/Applications/LibreOffice.app/Contents' : '/usr/lib/libreoffice')
def libreOfficeProgramPath = isMacOS ? "${libreOfficePath}/MacOS" : "${libreOfficePath}/program"
def libreOfficeClassesPath = isMacOS ? "${libreOfficePath}/Resources/java" : "${libreOfficePath}/program/classes"
def sofficeProzessName = isMacOS ? 'soffice' : 'soffice.bin'
def extensionId = descriptionXml.identifier.@value.text()

configurations {
    libreoffice
}

dependencies {

    implementation 'com.google.guava:guava:33.5.0-jre'
    implementation 'org.apache.commons:commons-lang3:3.20.0'
    implementation 'org.apache.commons:commons-collections4:4.5.0'
    implementation 'org.apache.commons:commons-text:1.15.0'
    implementation 'commons-io:commons-io:2.21.0'
    implementation 'org.apache.logging.log4j:log4j-core:2.25.3'
    implementation 'org.kohsuke:github-api:1.330'
    implementation 'com.google.code.gson:gson:2.13.2'
    implementation 'io.github.g00fy2:versioncompare:1.5.0'
    implementation 'org.jsoup:jsoup:1.22.1'
    implementation 'com.opencsv:opencsv:5.12.0'
    // Lokale Spieler-Stammdaten-DB. SQLite (xerial) ist multi-process-sicher
    // (POSIX-/Win32-Filelocks) und kollidiert nicht mit LO's eigenen Java-Libs
    // — daher kein Shading nötig.
    implementation 'org.xerial:sqlite-jdbc:3.53.1.0'
    // FTP/SFTP-Upload. LO bündelt weder commons-net noch jsch → kein Shading nötig.
    implementation 'commons-net:commons-net:3.11.1'
    implementation 'com.github.mwiede:jsch:0.2.20'

    // LibreOffice SDK dependencies - using local installation.
    // hsqldb.jar bleibt ausgeschlossen: LO bringt eine 1.8.0-Variante mit, die
    // den UNO-Classloader für jede zukünftige Java-DB-Lib vergiften würde.
    compileOnly fileTree(dir: libreOfficeClassesPath, include: ['*.jar'], exclude: ['hsqldb.jar', 'sdbc_hsqldb.jar'])
    compileOnly files(
        "${libreOfficeClassesPath}/ridl.jar",
        "${libreOfficeClassesPath}/unoil.jar",
        "${libreOfficeClassesPath}/jurt.jar",
        "${libreOfficeClassesPath}/juh.jar"
    )

    // LibreOffice SDK für Tests - use testImplementation so classes are available at runtime
    testImplementation fileTree(dir: libreOfficeClassesPath, include: ['*.jar'], exclude: ['hsqldb.jar', 'sdbc_hsqldb.jar'])
    testImplementation files(
        "${libreOfficeClassesPath}/ridl.jar",
        "${libreOfficeClassesPath}/unoil.jar",
        "${libreOfficeClassesPath}/jurt.jar",
        "${libreOfficeClassesPath}/juh.jar"
    )

    testImplementation 'org.junit.jupiter:junit-jupiter:5.14.3'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testImplementation 'org.assertj:assertj-core:3.27.6'
    testImplementation 'org.mockito:mockito-core:5.21.0'
    // Spike: ArchUnit Call-Graph-Analyse (Threading-Konventionstest, Helper-Klassen-Lücke)
    testImplementation 'com.tngtech.archunit:archunit:1.4.1'

    // Block B4: NullAway via ErrorProne. JSpecify als Annotations-Standard.
    errorprone 'com.google.errorprone:error_prone_core:2.36.0'
    errorprone 'com.uber.nullaway:nullaway:0.12.1'
    compileOnly 'org.jspecify:jspecify:1.0.0'
}

configurations.all {
	exclude group: 'commons-collections', module: 'commons-collections'
}

application {
    mainClass = 'de.petanqueturniermanager.SheetRunner'
}

tasks.register('cleanCache', Delete) {
    delete "dist/.ooo-debug/user/uno_packages/cache"
}

tasks.register('copyRuntimeLibs', Sync) {
    group = 'LibreOffice'
    description = 'Kopiert Runtime-Dependencies für die OXT'
    from configurations.runtimeClasspath
    into layout.buildDirectory.dir('runtime-libs')
}

// Task zum Erstellen des JAR mit UNO Registration
tasks.register('buildPluginJar', Jar) {
    group = 'LibreOffice'
    description = 'Erstellt das JAR mit UNO Registration und Class-Path zu libs'
    dependsOn classes, 'copyRuntimeLibs'
    archiveFileName.set("${project.name}.jar")

    from sourceSets.main.output

    // UNO components-Datei ins JAR META-INF (LibreOffice Standard-Location)
    from('.') {
        include 'PetanqueTurnierManager.components'
        into 'META-INF'
    }

    manifest {
        attributes(
            'RegistrationClassName': 'de.petanqueturniermanager.comp.RegistrationHandler',
            'Class-Path': configurations.runtimeClasspath.collect {
                "libs/${it.name}"
            }.join(' ')
        )
    }
}

// Task zum Erstellen der OXT-Datei (LibreOffice Extension)
// IDL zu RDB kompilieren (UNO Type Registry für AddIn-Funktionen)
// Benötigt Linux + libreoffice-dev (SDK mit unoidl-write). Auf macOS gibt es kein SDK
// im App-Bundle – dort schlägt der Task bewusst laut fehl, statt still eine OXT ohne
// RDB zu produzieren. Die OXT ist plattformunabhängig und wird auf Linux gebaut.
tasks.register('compileIdl', Exec) {
    group = 'LibreOffice'
    description = 'Kompiliert IDL-Dateien zu einer RDB Type-Registry (nur Linux mit SDK)'
    def unoidlWrite = "${libreOfficePath}/sdk/bin/unoidl-write"
    def typesRdb = "${libreOfficePath}/program/types.rdb"
    def offapiRdb = "${libreOfficePath}/program/types/offapi.rdb"
    def idlFile = file('idl/de/petanqueturniermanager/AddInGlobal.idl')
    def outputRdb = layout.buildDirectory.file('rdb/AddInGlobal.rdb').get().asFile

    inputs.file idlFile
    outputs.file outputRdb

    doFirst {
        outputRdb.parentFile.mkdirs()
    }
    commandLine unoidlWrite, typesRdb, offapiRdb, idlFile, outputRdb
}

tasks.register('buildOXT', Zip) {
    group = 'LibreOffice'
    description = 'Erstellt die OXT-Datei (LibreOffice Extension)'
    dependsOn 'buildPluginJar', 'copyRuntimeLibs', 'compileIdl', 'buildFrontend'
    archiveFileName.set("${project.name}-${version}.oxt")
    destinationDirectory.set(layout.buildDirectory.dir('distributions'))

    // JAR-Datei hinzufügen
    from(tasks.named('buildPluginJar', Jar).flatMap { it.archiveFile }) {
        into ''
    }

    // META-INF manifest
    from('META-INF') {
        into 'META-INF'
    }

    // Description and configuration files
    from('.') {
        include 'description.xml'
    }

    from('description') {
        include '*.txt'
        into 'description'
    }

    // Registry configuration (XCU files)
    from('registry') {
        into 'registry'
    }

    // Images (OXT-Root) – nur Laufzeit-Assets:
    // - Logo-PNGs für description.xml (32px Default, 256px High-Contrast)
    // - Sidebar-24px-Logo (Quelle für den registry/-Kopierschritt darunter)
    // - Sidebar-Icons (geladen via getImageUrlDir() + "sidebar/…" durch InfoSidebarContent)
    // - Konfig-Dialog-Icons (geladen via getImageUrlDir() + "konfig/…" durch konfigdialog)
    // NICHT enthalten: images/icons/{32,48,64,128,svg,*.py,README,preview*},
    //   images/toolbar-*.png (Root-Ebene), images/petanqueturniermanager-logo.png,
    //   images/sidebar-fortschritt.png, images/pdf-download.png (Classpath-Res. im JAR),
    //   images/*.py, images/*.readme
    from('images') {
        include 'petanqueturniermanager-logo-32px.png'
        include 'petanqueturniermanager-logo-256px.png'
        include 'petanqueturniermanager-logo-sidebar-24px.png'
        into 'images'
    }
    from('images/sidebar') {
        include '*.png'
        into 'images/sidebar'
    }
    from('images/konfig') {
        include '*.png'
        into 'images/konfig'
    }

    // Logo für Sidebar-Deck-Icon: %origin% in Sidebar.xcu ist relativ zur XCU-Datei,
    // daher muss das Bild auch unter registry/org/openoffice/Office/UI/images/ liegen.
    // Passgenaue 24px-Größe ausliefern (Design-Größe der Sidebar-TabBar, vgl. LOs eigene
    // sidebar-*-large.png), damit LibreOffice das Icon NICHT zur Laufzeit skalieren muss.
    from('images') {
        include 'petanqueturniermanager-logo-sidebar-24px.png'
        into 'registry/org/openoffice/Office/UI/images'
    }

    // Toolbar-Icons: %origin% in den Addons_Z*_*.xcu ist relativ zur XCU-Datei,
    // daher müssen die Bilder auch unter registry/org/openoffice/Office/images/ liegen.
    // Passgenaue Größen ausliefern (16px für ImageSmallURL, 24px für ImageBigURL),
    // damit LibreOffice die Icons NICHT zur Toolbar-Fill-Zeit herunterskalieren muss
    // (Skalierung großer PNGs verursachte unter Windows beim Start schwarze Icon-Flächen).
    from('images/icons/png/16') {
        include 'toolbar-*.png'
        into 'registry/org/openoffice/Office/images/16'
    }
    from('images/icons/png/24') {
        include 'toolbar-*.png'
        into 'registry/org/openoffice/Office/images/24'
    }

    // Runtime dependencies (libs)
    from(layout.buildDirectory.dir('runtime-libs')) {
        into 'libs'
    }

    // RDB Type Registry (kompiliert aus IDL)
    from(layout.buildDirectory.dir('rdb')) {
        include '*.rdb'
    }
}

// Task zum Installieren der Extension in LibreOffice
tasks.register('installExtension', Exec) {
    group = 'LibreOffice'
    description = 'Installiert die erstellte Extension in LibreOffice'
    dependsOn 'buildOXT'
    mustRunAfter 'uninstallExtension'
    def oxtFile = layout.buildDirectory.file("distributions/${project.name}-${version}.oxt").get().asFile
    commandLine "${libreOfficeProgramPath}/unopkg", 'add', '-f', oxtFile

    doFirst {
        println "Installiere Extension: ${oxtFile}"
    }
}

// Task zum Beenden laufender LibreOffice-Instanzen (nötig vor (De-)Installation)
tasks.register('stopLibreOffice', Exec) {
    group = 'LibreOffice'
    description = 'Beendet alle laufenden LibreOffice-Instanzen'
    // Linux-Prozess heißt soffice.bin, der macOS-Prozess soffice
    commandLine 'pkill', '-x', sofficeProzessName
    ignoreExitValue = true

    doLast {
        if (executionResult.get().exitValue == 0) {
            println "LibreOffice wurde beendet."
            Thread.sleep(1500)
        }
    }
}

// Task zum Deinstallieren der Extension
tasks.register('uninstallExtension', Exec) {
    group = 'LibreOffice'
    description = 'Deinstalliert die Extension aus LibreOffice'
    dependsOn 'stopLibreOffice'
    commandLine "${libreOfficeProgramPath}/unopkg", 'remove', extensionId
    ignoreExitValue = true
    errorOutput = new ByteArrayOutputStream()
    standardOutput = new ByteArrayOutputStream()

    doFirst {
        println "Deinstalliere Extension: ${extensionId}"
    }
    doLast {
        if (executionResult.get().exitValue != 0) {
            println "Hinweis: Extension war nicht installiert, überspringe Deinstallation."
        }
    }
}

// Task zum Neuinstallieren
tasks.register('reinstallExtension') {
    group = 'LibreOffice'
    description = 'De-/Neuinstallation der Extension'
    dependsOn 'uninstallExtension', 'installExtension'
}

// Debug-Task: Startet LibreOffice mit Debug-Port
tasks.register('debugLibreOffice', Exec) {
    group = 'LibreOffice'
    description = 'Startet LibreOffice im Debug-Modus mit JDWP'
    dependsOn 'reinstallExtension'

    environment 'JAVA_TOOL_OPTIONS', '-agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=*:5005'

    commandLine "${libreOfficeProgramPath}/soffice", '--calc'

    doFirst {
        println "LibreOffice wird im Debug-Modus gestartet..."
        println "Verbinde deinen Debugger mit Port 5005"
    }
}

// Task zum Starten von LibreOffice
tasks.register('runLibreoffice', Exec) {
    group = 'LibreOffice'
    description = 'Startet LibreOffice Calc nach Neuinstallation der Extension'
    dependsOn 'reinstallExtension'

    commandLine "${libreOfficeProgramPath}/soffice", '--calc'

    doFirst {
        println "Starte LibreOffice Calc..."
    }
}

// UITests benötigen die aktuelle OXT installiert.
// Standard: nur Unit-Tests (kein Reinstall nötig).
// Mit -PuitTests=true werden auch UITests ausgeführt und die Extension reinstalliert.
def mitUiTests = project.hasProperty('uitTests') && project.uitTests == 'true'

// Java 25: LibreOffice lädt native Libs via System.load() – ohne --enable-native-access
// erscheint pro Fork eine WARNING. Für alle Test-Tasks freischalten.
//
// Default-Locale auf de_DE pinnen: Mehrere Tests vergleichen i18n-Texte
// (z.B. "Abbruch", "Spieler Namen … ist doppelt") und schlagen sonst auf
// CI-Runnern mit en_US-Locale fehl.
tasks.withType(Test).configureEach {
    jvmArgs '--enable-native-access=ALL-UNNAMED'
    systemProperty 'user.language', 'de'
    systemProperty 'user.country', 'DE'
}

test {
    if (mitUiTests) {
        dependsOn 'reinstallExtension'
        // UITests nie aus dem Build-Cache laden – LibreOffice-Zustand kann sich geändert haben
        outputs.upToDateWhen { false }
    }
    // UITests starten LibreOffice auf Port 8100 – nur ein Worker gleichzeitig erlaubt
    maxParallelForks = 1
    // Im Gradle-Build immer headless; manuelle IDE-Starts verwenden headless=false (Standard)
    systemProperty 'uitest.headless', 'true'
    useJUnitPlatform()
    if (!mitUiTests) {
        // UITests ausschließen wenn kein -PuitTests=true gesetzt
        exclude '**/*UITest*'
    }
    // Hängende UITests nach 3 Minuten pro Test abbrechen (soffice-Verbindung kann blockieren)
    systemProperty 'junit.jupiter.execution.timeout.default', '3 m'
}

// UITests (ohne Beispielturnier): führt alle *UITest*-Klassen durch, außer dem Beispielturnier-Package.
// Entspricht ./gradlew test -PuitTests=true, aber als eigenständiger Task ohne Property-Pflicht.
tasks.register('uiTests', Test) {
    group = 'LibreOffice'
    description = 'Führt alle normalen UI-Tests durch (ohne Beispielturnier-Tests). Benötigt reinstallExtension.'
    dependsOn 'reinstallExtension'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    outputs.upToDateWhen { false }
    maxParallelForks = 1
    systemProperty 'uitest.headless', 'true'
    systemProperty 'junit.jupiter.execution.timeout.default', '3 m'
    useJUnitPlatform()
    include '**/*UITest*'
    exclude 'de/petanqueturniermanager/beispielturnier/**'
}

// Beispielturnier-Tests: führen alle registrierten Beispielturniere als UI-Test durch.
// Unterstützte Locales: de (Standard), en, nl, fr, es.
// Verwendung:
//   ./gradlew beispielturnierTests              # Deutsch
//   ./gradlew beispielturnierTests -Plocale=en  # Englisch
//   ./gradlew beispielturnierTests -Plocale=nl  # Niederländisch
tasks.register('beispielturnierTests', Test) {
    group = 'LibreOffice'
    description = 'Führt alle Beispielturnier-UITests durch. Locale wählbar: -Plocale=de|en|nl|fr|es'
    dependsOn 'reinstallExtension'
    // Test-Quelldateien und Classpath aus dem test-SourceSet laden
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    // Nie aus Cache laden – LibreOffice-Zustand kann sich geändert haben
    outputs.upToDateWhen { false }
    // LibreOffice auf Port 8100 – nur ein Worker gleichzeitig
    maxParallelForks = 1
    systemProperty 'uitest.headless', 'true'
    systemProperty 'beispielturnier.locale', project.hasProperty('locale') ? project.locale : 'de'
    systemProperty 'junit.jupiter.execution.timeout.default', '5 m'
    useJUnitPlatform()
    // Nur Tests im beispielturnier-Package und formulex-Rangliste ausführen
    filter {
        includeTestsMatching 'de.petanqueturniermanager.beispielturnier.*'
        includeTestsMatching 'de.petanqueturniermanager.formulex.rangliste.*'
    }
    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams = false
    }
}

// Druckvorschau-Crash-Reproduktion: startet LO mit sichtbarem Fenster (ohne --headless),
// damit VCL-Toolbar-Controller aktiv sind und addStatusListener() aufgerufen wird.
// Verwendung: ./gradlew druckvorschauNative
tasks.register('druckvorschauNative', Test) {
    group = 'LibreOffice'
    description = 'Führt DruckvorschauUITest mit sichtbarem LO-Fenster durch (kein --headless). Benötigt Display.'
    dependsOn 'reinstallExtension'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    outputs.upToDateWhen { false }
    maxParallelForks = 1
    // uitest.headless=false → OfficeStarter startet LO OHNE --headless
    systemProperty 'uitest.headless', 'false'
    systemProperty 'junit.jupiter.execution.timeout.default', '3 m'
    useJUnitPlatform()
    filter {
        includeTestsMatching 'de.petanqueturniermanager.DruckvorschauUITest'
    }
    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams = true
    }
}

// LO mit SAL_LOG (C++-Logging) für Crash-Diagnose starten.
// Verwendung: ./gradlew loDebugLog
// Analyse: build/lo-crash/sal.log öffnen, GLib-GObject-CRITICAL und Timing prüfen
tasks.register('loDebugLog', Exec) {
    group = 'LibreOffice'
    description = 'Startet LibreOffice mit SAL_LOG (C++) für Crash-Diagnose. Druckvorschau manuell testen.'
    dependsOn 'reinstallExtension'

    def loLogDir = file("${buildDir}/lo-crash")
    def salLogFile = file("${loLogDir}/sal.log")

    // SAL_LOG-Format: +WARN = alle C++-Warnungen; +INFO.vcl.gtk = GTK/VCL-Widget-Lifecycle
    environment 'SAL_LOG', '+WARN+INFO.vcl.gtk'

    // LO starten; stderr in Datei + Terminal gleichzeitig
    commandLine 'bash', '-c', """
        mkdir -p '${loLogDir}'
        '${libreOfficeProgramPath}/soffice' --calc 2>&1 | tee '${salLogFile}'
    """

    doFirst {
        println "═══════════════════════════════════════════════════════"
        println " SAL_LOG → ${salLogFile}"
        println "═══════════════════════════════════════════════════════"
    }
}

// LO mit XWayland (GDK_BACKEND=x11) starten – prüft ob der Druckvorschau-Crash
// Wayland-spezifisch ist. Wenn kein Crash: Ursache ist im LO-Wayland-Backend.
// Verwendung: ./gradlew loX11
tasks.register('loX11', Exec) {
    group = 'LibreOffice'
    description = 'Startet LibreOffice mit GDK_BACKEND=x11 (XWayland). Druckvorschau-Crash-Test.'
    dependsOn 'reinstallExtension'

    def loLogDir = file("${buildDir}/lo-crash")
    def salLogFile = file("${loLogDir}/sal-x11.log")

    environment 'GDK_BACKEND', 'x11'
    environment 'SAL_LOG', '+WARN'

    commandLine 'bash', '-c', """
        mkdir -p '${loLogDir}'
        '${libreOfficeProgramPath}/soffice' --calc 2>&1 | tee '${salLogFile}'
    """

    doFirst {
        println "═══════════════════════════════════════════════════════"
        println " GDK_BACKEND=x11 (XWayland) – kein Wayland-GTK"
        println " SAL_LOG → ${salLogFile}"
        println " Test: Druckvorschau öffnen + schließen"
        println " Kein Crash → Wayland-GTK-Bug in LO"
        println "═══════════════════════════════════════════════════════"
    }
}

// LO unter gdb starten für interaktive Crash-Analyse (Stack Trace).
// Verwendung: ./gradlew loGdb
//   → LO öffnet sich; Druckvorschau öffnen + schließen
//   → Bei Crash: in gdb "bt full" eingeben → Stack Trace zeigt LO-Crash-Ursache
//   → "q" zum Beenden
tasks.register('loGdb', Exec) {
    group = 'LibreOffice'
    description = 'Startet LibreOffice unter gdb für interaktive Crash-Analyse.'
    dependsOn 'reinstallExtension'

    def loLogDir = file("${buildDir}/lo-crash")

    commandLine 'bash', '-c', """
        mkdir -p '${loLogDir}'
        cd '${loLogDir}'
        gdb -ex 'handle SIGSEGV stop' \\
            -ex 'handle SIGABRT stop' \\
            -ex 'run --calc' \\
            '${libreOfficeProgramPath}/soffice.bin'
    """

    doFirst {
        println "═══════════════════════════════════════════════════════"
        println " gdb: interaktive Crash-Analyse"
        println " 1. LO startet – Druckvorschau öffnen + schließen"
        println " 2. Bei Crash: 'bt full' eingeben → Stack Trace"
        println " 3. 'q' zum Beenden"
        println "═══════════════════════════════════════════════════════"
    }
}

